<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Isabelle Logic Flow | @pepelluba</title>
    <!-- Fuentes: preconnect + carga no bloqueante -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Non-blocking font load: evita que el CSS de fuentes bloquee el render -->
    <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap"
        onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap">
    </noscript>
 
    <!-- CSS Puro Optimizado -->
    <link rel="stylesheet" href="css/estilo.css">

    <!-- Anti-FOUC: ejecuta ANTES del render -->
    <style id="fouc-shield">
        body {
            opacity: 0 !important;
            transition: opacity 0.3s ease;
        }

        /* Si el JS falla o tarda mucho, mostramos igual */
        html.app-ready body {
            opacity: 1 !important;
        }
    </style>
    <script>
        // 1. Carga directa a /logica (cualquier sub-ruta)
        if (window.location.hash.startsWith('#/logica')) {
            document.documentElement.classList.add('direct-logica');
        }

        // 2. Dark Mode inmediato (evita flashazo blanco)
        if (localStorage.getItem('pepeweb_theme') === 'dark') {
            document.documentElement.classList.add('dark-mode-preload');
        }

        // 3. FOUC de fuentes y contenido: oculta hasta que esté todo listo
        document.documentElement.classList.add('fonts-loading');

        function revealApp() {
            if (document.documentElement.classList.contains('app-ready')) return;
            document.documentElement.classList.remove('fonts-loading');
            document.documentElement.classList.add('fonts-ready');
            document.documentElement.classList.add('app-ready');
        }

        // Timeout de seguridad: 1s máximo de espera por fuentes
        var _fontsTimer = setTimeout(revealApp, 1000);

        if (document.fonts && document.fonts.ready) {
            document.fonts.ready.then(function() {
                clearTimeout(_fontsTimer);
                revealApp();
            });
        } else {
            // Fallback para navegadores sin document.fonts
            window.addEventListener('load', revealApp);
        }
    </script>
</head>
<body>
 
    <!--
        IMPORTANTE: Toggle, sidebar y backdrop en el body, NO dentro de #main-app.
        Cualquier ancestro con transform/filter/will-change (como el de la animación de #main-app)
        rompe el position:fixed en navegadores móviles.
    -->
    <div id="mobile-sidebar-backdrop"></div>
    <button id="mobile-sidebar-toggle" aria-label="Abrir menú de temas" aria-controls="sidebar" aria-expanded="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"
            stroke-linejoin="round" aria-hidden="true">
            <path d="M9 18l6-6-6-6" />
        </svg>
    </button>

    <!-- SIDEBAR: Temas (Ahora fuera de main-app para estabilidad total) -->
    <aside id="sidebar">
        <div class="liquidGlass-wrapper sidebar-dock">
            <div class="liquidGlass-effect"></div>
            <div class="liquidGlass-tint"></div>
            <div class="liquidGlass-shine"></div>
            <div class="liquidGlass-text sidebar-dock-inner">
                <nav id="theme-nav">
                    <!-- Temas inyectados aquí por JS -->
                </nav>
                <div class="sidebar-divider"></div>
                <div class="light-switch-wrapper sidebar-switch">
                    <input type="checkbox" class="theme-toggle" id="theme-toggle-app">
                    <label for="theme-toggle-app" class="light-switch" aria-label="Cambiar modo oscuro/claro"></label>
                </div>
            </div>
        </div>
    </aside>

    <!-- ENCABEZADO GLOBAL (Siempre visible) -->
    <div id="global-header" class="global-header hidden-element">
        <button id="global-back">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5" />
                <polyline points="12 19 5 12 12 5" />
            </svg>
            <span>VOLVER</span>
        </button>
    </div>

    <!-- PANTALLA 1: INTRODUCCIÓN ANIMADA -->
    <div id="intro-screen" class="screen active">
        <!-- Switch for Intro -->
        <div class="light-switch-wrapper intro-switch">
            <input type="checkbox" class="theme-toggle" id="theme-toggle-intro">
            <label for="theme-toggle-intro" class="light-switch" aria-label="Cambiar modo oscuro/claro"></label>
        </div>
        <div class="intro-content">
            <h1 id="intro-text">@pepelluba</h1>
            <div id="intro-reveal" class="hidden">
                <button id="logic-btn">Lógica Matemática</button>
                <button id="soon-btn" disabled aria-disabled="true" title="Próximamente">Próximamente</button>
                <p id="sub-text">Universidad de Sevilla Matemáticas</p>
            </div>
        </div>
    </div>

    <script>
        (function initTheme() {
            const theme = localStorage.getItem('pepeweb_theme') || 'light';
            const isDark = (theme === 'dark');
            const htmlEl = document.documentElement;

            if (isDark) document.body.classList.add('dark-mode');
            if (htmlEl.classList.contains('dark-mode-preload')) {
                htmlEl.classList.remove('dark-mode-preload');
            }

            const toggles = Array.from(document.querySelectorAll('.theme-toggle'));
            toggles.forEach(t => {
                t.checked = isDark;
                t.onchange = () => {
                    const checked = t.checked;
                    toggles.forEach(other => other.checked = checked);
                    document.body.classList.toggle('dark-mode', checked);
                    localStorage.setItem('pepeweb_theme', checked ? 'dark' : 'light');
                };
            });
        })();

        (function bindLogicBtn() {
            const btn = document.getElementById('logic-btn');
            if (!btn) return;
            btn.addEventListener('click', () => {
                window.location.href = (window.location.protocol === 'file:') ? './logica/index.html' : './logica/';
            });
        })();

        (function playIntroSequence() {
            const introText = document.getElementById('intro-text');
            const introReveal = document.getElementById('intro-reveal');
            if (!introText || !introReveal) return;

            introText.animate([{ opacity: 0 }, { opacity: 1 }], { duration: 1000, easing: 'ease-out', fill: 'forwards' })
                .finished
                .then(() => new Promise(r => setTimeout(r, 300)))
                .then(() => {
                    introReveal.classList.remove('hidden');
                    introReveal.animate([
                        { opacity: 0, transform: 'translate3d(0, -20px, 0)' },
                        { opacity: 1, transform: 'translate3d(0, 0, 0)' }
                    ], { duration: 1000, easing: 'cubic-bezier(0.22, 1, 0.36, 1)', fill: 'forwards' });
                });
        })();

        (function initCustomCursor() {
            if (!window.matchMedia("(pointer: fine)").matches) return;
            const cursor = document.createElement('div');
            cursor.id = 'custom-cursor';
            document.body.appendChild(cursor);

            document.addEventListener('mousemove', (e) => {
                cursor.style.left = `${e.clientX}px`;
                cursor.style.top = `${e.clientY}px`;
            });

            document.body.addEventListener('mouseover', (e) => {
                if (e.target.closest('button, a, input, .wiki-subsummary, .exercise-card, .light-switch, .icon-btn')) {
                    cursor.classList.add('hover');
                }
            });

            document.body.addEventListener('mouseout', (e) => {
                if (e.target.closest('button, a, input, .wiki-subsummary, .exercise-card, .light-switch, .icon-btn')) {
                    cursor.classList.remove('hover');
                }
            });
        })();

        (function initBackgroundParallax() {
            if (!window.matchMedia("(pointer: fine)").matches) return;
            let raf = 0;
            let targetX = 0;
            let targetY = 0;
            let currentX = 0;
            let currentY = 0;
            const strength = 12;

            function commit() {
                currentX += (targetX - currentX) * 0.08;
                currentY += (targetY - currentY) * 0.08;

                document.documentElement.style.setProperty('--bg-x', `${currentX}px`);
                document.documentElement.style.setProperty('--bg-y', `${currentY}px`);

                if (Math.abs(targetX - currentX) > 0.01 || Math.abs(targetY - currentY) > 0.01) {
                    raf = requestAnimationFrame(commit);
                } else {
                    raf = 0;
                }
            }

            document.addEventListener('mousemove', (e) => {
                targetX = (e.clientX / window.innerWidth - 0.5) * strength * 2;
                targetY = (e.clientY / window.innerHeight - 0.5) * strength * 2;
                if (!raf) raf = requestAnimationFrame(commit);
            }, { passive: true });

            document.addEventListener('mouseleave', () => {
                targetX = 0;
                targetY = 0;
                if (!raf) raf = requestAnimationFrame(commit);
            });
        })();

        (function styleGlobalBack() {
            const globalBack = document.getElementById('global-back');
            if (!globalBack) return;
            globalBack.innerHTML = `
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                <span style="font-family:'Outfit';font-weight:300;letter-spacing:1px;font-size:0.9rem;">VOLVER</span>
            `;
        })();
    </script>
</body>
</html>
